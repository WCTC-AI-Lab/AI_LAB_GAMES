function flagEmoji(cc) {
  const base = 0x1f1e6;
  const u = cc.toUpperCase();
  const a = base + (u.charCodeAt(0) - 65);
  const b = base + (u.charCodeAt(1) - 65);
  return String.fromCodePoint(a, b);
}

function flagImageUrl(cc) {
  return FLAGCDN_BASE + cc.toLowerCase() + ".png";
}

function shuffle(arr) {
  const a = arr.slice();
  for (let i = a.length - 1; i > 0; i--) {
    const j = Math.floor(Math.random() * (i + 1));
    const t = a[i];
    a[i] = a[j];
    a[j] = t;
  }
  return a;
}

function choiceCount(score) {
  return Math.min(4 + 2 * Math.min(Math.floor(score / 10), 3), 10);
}

function computePlayState(solvedSet, score) {
  var cap = Math.min(1 + Math.floor(score / 10), 3);
  function remainingAt(c) {
    return COUNTRIES.filter(function (x) {
      return x.tier <= c && !solvedSet.has(x.code);
    });
  }
  var rem = remainingAt(cap);
  while (rem.length === 0 && cap < 3) {
    cap++;
    rem = remainingAt(cap);
  }
  return { remaining: rem, tierCap: cap };
}

scene("game", () => {
  let score = 0;
  let roundLocked = false;
  let cooldown = 0;
  let hitTargets = [];
  let lastCorrectName = "";
  let roundAnswer = null;
  const solvedCodes = new Set();
  const flagSpriteLoaded = {};

  let flagPic = null;
  let fallbackEmoji = null;

  const scoreLabel = add([
    text("Right: 0", { size: 22 }),
    pos(20, 16),
    color(226, 232, 240),
    z(10),
  ]);

  const choicesLabel = add([
    text("4 choices", { size: 17 }),
    pos(W - 16, 14),
    anchor("topright"),
    color(226, 232, 240),
    z(10),
  ]);

  const progressLabel = add([
    text("", { size: 13 }),
    pos(W - 16, 36),
    anchor("topright"),
    color(148, 163, 184),
    z(10),
  ]);

  function refreshHud() {
    var st = computePlayState(solvedCodes, score);
    scoreLabel.text = "Right: " + score;
    choicesLabel.text = choiceCount(score) + " choices";
    progressLabel.text = st.remaining.length + " flags to go";
  }

  add([
    text("Guess the country!", { size: 26 }),
    pos(W / 2, 44),
    anchor("center"),
    color(248, 250, 252),
    z(10),
  ]);

  const flagStatusLabel = add([
    text("", { size: 18 }),
    pos(W / 2, 152),
    anchor("center"),
    color(148, 163, 184),
    z(6),
  ]);

  const feedbackLabel = add([
    text("", { size: 18 }),
    pos(W / 2, 218),
    anchor("center"),
    color(250, 204, 21),
    z(10),
  ]);

  add([
    text(
      "Clear every flag once to win. Keys 1–9 and 0 (0 = 10th). More choices every 10 right.",
      { size: 11 }
    ),
    pos(W / 2, H - 14),
    anchor("center"),
    color(148, 163, 184),
    opacity(0.9),
    z(10),
  ]);

  const roundObjects = [];

  function clearFlagDisplay() {
    if (flagPic) {
      flagPic.destroy();
      flagPic = null;
    }
    if (fallbackEmoji) {
      fallbackEmoji.destroy();
      fallbackEmoji = null;
    }
    flagStatusLabel.text = "";
  }

  function clearRound() {
    clearFlagDisplay();
    while (roundObjects.length) {
      roundObjects.pop().destroy();
    }
    hitTargets = [];
  }

  function spawnChoiceButtons(options, correct) {
    var N = options.length;
    var colGap = 10;
    var rowGap = 5;
    var marginSide = 32;
    var gridTop = 244;
    var bottomReserve = 40;
    var btnW = (W - marginSide * 2 - colGap) / 2;
    var rows = N / 2;
    var btnH = Math.min(
      34,
      Math.floor((H - gridTop - bottomReserve) / rows - rowGap)
    );
    var fontSize = N > 6 ? 13 : N > 4 ? 15 : 16;

    for (var i = 0; i < N; i++) {
      var c = options[i];
      var col = i % 2;
      var row = Math.floor(i / 2);
      var x = marginSide + col * (btnW + colGap) + btnW / 2;
      var y = gridTop + row * (btnH + rowGap) + btnH / 2;
      var isCorrect = c.code === correct.code;
      var keyLabel = i === 9 ? "0" : String(i + 1);

      var bg = add([
        rect(btnW, btnH, { radius: 6 }),
        pos(x, y),
        anchor("center"),
        color(30, 41, 59),
        outline(2, rgb(71, 85, 105)),
        z(2),
      ]);
      roundObjects.push(bg);

      var lbl = add([
        text(
          keyLabel + ". " + c.name,
          { size: fontSize, width: btnW - 14, align: "center" }
        ),
        pos(x, y),
        anchor("center"),
        color(226, 232, 240),
        z(3),
      ]);
      roundObjects.push(lbl);

      hitTargets.push({
        x: x,
        y: y,
        w: btnW,
        h: btnH,
        correct: isCorrect,
        name: c.name,
      });
    }
  }

  function finishRound(options, correct) {
    spawnChoiceButtons(options, correct);
    roundLocked = false;
  }

  function showFallbackFlag(correct) {
    fallbackEmoji = add([
      text(flagEmoji(correct.code), { size: 100 }),
      pos(W / 2, 146),
      anchor("center"),
      z(5),
    ]);
  }

  function startRound() {
    clearRound();
    roundLocked = true;
    feedbackLabel.text = "";
    refreshHud();

    var st = computePlayState(solvedCodes, score);
    if (st.remaining.length === 0) {
      go("win", score);
      return;
    }

    var num = choiceCount(score);
    var correct = st.remaining[Math.floor(Math.random() * st.remaining.length)];
    roundAnswer = correct;
    lastCorrectName = correct.name;

    var wrongNeed = num - 1;
    var poolDistr = COUNTRIES.filter(function (c) {
      return c.tier <= st.tierCap && c.code !== correct.code;
    });
    var wrongPick = shuffle(poolDistr).slice(0, wrongNeed);
    if (wrongPick.length < wrongNeed) {
      var extra = shuffle(
        COUNTRIES.filter(function (c) {
          if (c.code === correct.code) return false;
          return !wrongPick.some(function (w) {
            return w.code === c.code;
          });
        })
      );
      while (wrongPick.length < wrongNeed && extra.length) {
        wrongPick.push(extra.pop());
      }
    }
    var options = shuffle([correct].concat(wrongPick));

    const cc = correct.code.toLowerCase();
    const sprKey = "fcd_" + cc;
    const url = flagImageUrl(correct.code);

    flagStatusLabel.text = "Loading flag…";

    function onFlagVisible() {
      flagStatusLabel.text = "";
      finishRound(options, correct);
    }

    function attachSprite() {
      if (flagPic) {
        flagPic.destroy();
        flagPic = null;
      }
      flagPic = add([
        sprite(sprKey),
        pos(W / 2, 152),
        anchor("center"),
        scale(num > 6 ? 1.25 : 1.45),
        z(5),
      ]);
    }

    if (flagSpriteLoaded[sprKey]) {
      attachSprite();
      onFlagVisible();
      return;
    }

    var loadResult = loadSprite(sprKey, url);
    if (loadResult && typeof loadResult.then === "function") {
      loadResult
        .then(function () {
          flagSpriteLoaded[sprKey] = true;
          attachSprite();
          onFlagVisible();
        })
        .catch(function () {
          showFallbackFlag(correct);
          onFlagVisible();
        });
    } else {
      setTimeout(function () {
        flagSpriteLoaded[sprKey] = true;
        try {
          attachSprite();
        } catch (e) {
          showFallbackFlag(correct);
        }
        onFlagVisible();
      }, 120);
    }
  }

  function pick(index) {
    if (roundLocked || index < 0 || index >= hitTargets.length) return;
    roundLocked = true;
    const t = hitTargets[index];
    if (t.correct) {
      solvedCodes.add(roundAnswer.code);
      score++;
      scoreLabel.text = "Right: " + score;
      refreshHud();
      var next = computePlayState(solvedCodes, score);
      if (next.remaining.length === 0) {
        go("win", score);
        return;
      }
      feedbackLabel.text = "Nice — correct!";
      feedbackLabel.color = rgb(74, 222, 128);
    } else {
      feedbackLabel.text = "Not quite — it was " + lastCorrectName + ".";
      feedbackLabel.color = rgb(248, 113, 113);
    }
    cooldown = 1.25;
  }

  function pointInHit(px, py, t) {
    const hw = t.w / 2;
    const hh = t.h / 2;
    return px >= t.x - hw && px <= t.x + hw && py >= t.y - hh && py <= t.y + hh;
  }

  onMouseRelease("left", () => {
    if (roundLocked) return;
    const m = mousePos();
    for (let i = 0; i < hitTargets.length; i++) {
      if (pointInHit(m.x, m.y, hitTargets[i])) {
        pick(i);
        return;
      }
    }
  });

  onCharInput(function (ch) {
    if (roundLocked) return;
    var n = hitTargets.length;
    if (n <= 0) return;
    var map = {
      "1": 0,
      "2": 1,
      "3": 2,
      "4": 3,
      "5": 4,
      "6": 5,
      "7": 6,
      "8": 7,
      "9": 8,
      "0": 9,
    };
    var idx = map[ch];
    if (idx !== undefined && idx < n) pick(idx);
  });

  onUpdate(() => {
    if (cooldown > 0) {
      cooldown -= dt();
      if (cooldown <= 0) startRound();
    }
  });

  refreshHud();
  startRound();
});

    anchor("center"),
    color(226, 232, 240),
    z(10),

  add([
    text("Got it right " + finalScore + " times.", { size: 20 }),
    pos(W / 2, H / 2 + 10),
    anchor("center"),
    color(200, 200, 210),
    z(10),
  ]);
  add([
    text("Space or click to play again", { size: 18 }),
    pos(W / 2, H / 2 + 70),
    anchor("center"),
    color(148, 163, 184),
    z(10),
  ]);
  onKeyPress("space", function () {
    go("game");
  });
  onClick(function () {
    go("game");
  });
});
