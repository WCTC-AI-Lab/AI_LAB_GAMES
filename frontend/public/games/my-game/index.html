<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Arrow Shooter</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    background: #020617;
    display: flex;
    align-items: center;
    justify-content: center;
    min-height: 100vh;
    overflow: hidden;
  }
  canvas {
    display: block;
    border: 2px solid rgba(148, 163, 184, 0.5);
    border-radius: 8px;
    box-shadow: 0 0 24px rgba(100, 116, 139, 0.15);
  }
</style>
</head>
<body>
<script src="../_lib/kaplay.js"></script>
<script>
kaplay({
  width: 800,
  height: 500,
  background: [15, 23, 42],
  crisp: true,
});

const W = 800;
const H = 500;
const GROUND_Y = 440;
const GROUND_H = 60;
const GRAVITY = 1200;
const JUMP_STRENGTH = 420;
const PLAYER_SPEED = 280;
const MIN_ARROW_POWER = 120;
const MAX_ARROW_POWER = 700;
const MIN_DRAG = 15;
const TARGET_R = 28;

const PLATFORMS = [
  { x: 80, y: 380, w: 120, h: 16 },
  { x: 320, y: 320, w: 100, h: 16 },
  { x: 540, y: 380, w: 100, h: 16 },
  { x: 180, y: 260, w: 90, h: 12 },
  { x: 480, y: 280, w: 100, h: 12 },
  { x: 650, y: 340, w: 80, h: 12 },
];

scene("game", () => {
  let score = 0;
  const arrows = [];
  let velY = 0;
  let crouching = false;
  const standingH = 48;
  const crouchH = 32;

  const scoreLabel = add([
    text("Score: 0", { size: 20 }),
    pos(24, 24),
    color(200, 200, 210),
  ]);

  const playerOval = add([
    circle(20),
    scale(1, 1.2),
    pos(0, 0),
    color(120, 140, 180),
    anchor("center"),
    "player",
  ]);

  let playerX = W / 2;
  let playerY = GROUND_Y;

  let dragStart = null;
  let dragCurrent = null;
  let lastShotLine = null;
  let lastShotLineFrames = 0;

  onKeyDown("left", () => { if (!crouching) playerX -= PLAYER_SPEED * dt(); });
  onKeyDown("right", () => { if (!crouching) playerX += PLAYER_SPEED * dt(); });
  onKeyDown("a", () => { if (!crouching) playerX -= PLAYER_SPEED * dt(); });
  onKeyDown("d", () => { if (!crouching) playerX += PLAYER_SPEED * dt(); });
  let grounded = false;
  onKeyDown("up", () => {
    if (grounded) velY = -JUMP_STRENGTH;
  });
  onKeyDown("w", () => {
    if (grounded) velY = -JUMP_STRENGTH;
  });
  onKeyDown("down", () => { crouching = true; });
  onKeyDown("s", () => { crouching = true; });
  onKeyRelease("down", () => { crouching = false; });
  onKeyRelease("s", () => { crouching = false; });

  function shootFromDrag(start, end) {
    let dx = start.x - end.x;
    let dy = start.y - end.y;
    const len = Math.hypot(dx, dy);
    if (len < MIN_DRAG) return;
    dx /= len;
    dy /= len;
    const power = Math.min(MAX_ARROW_POWER, Math.max(MIN_ARROW_POWER, len * 2.2));
    const angle = Math.atan2(dy, dx);
    const h = crouching ? crouchH : standingH;
    const py = playerY - h / 2;
    arrows.push({
      x: playerX,
      y: py,
      vx: dx * power,
      vy: dy * power,
      angle: angle,
    });
  }

  onMousePress("left", () => {
    const mp = mousePos();
    dragStart = { x: mp.x, y: mp.y };
    dragCurrent = { x: mp.x, y: mp.y };
  });
  onMouseMove(() => {
    if (dragStart) {
      const mp = mousePos();
      dragCurrent = { x: mp.x, y: mp.y };
    }
  });
  onMouseRelease("left", () => {
    if (dragStart && dragCurrent) {
      lastShotLine = { start: { ...dragStart }, end: { ...dragCurrent } };
      lastShotLineFrames = 18;
      shootFromDrag(dragStart, dragCurrent);
    }
    dragStart = null;
    dragCurrent = null;
  });

  let target = add([
    circle(TARGET_R),
    pos(Math.random() * (W - 100) + 50, Math.random() * (GROUND_Y - 120) + 40),
    color(220, 100, 100),
    anchor("center"),
    "target",
  ]);

  onUpdate(() => {
    const h = crouching ? crouchH : standingH;
    velY += GRAVITY * dt();
    playerY += velY * dt();

    grounded = false;
    let landed = false;
    for (const p of PLATFORMS) {
      if (velY >= 0 && playerY >= p.y - 2 && playerY <= p.y + 25 &&
          playerX >= p.x - 20 && playerX <= p.x + p.w + 20) {
        playerY = p.y;
        velY = 0;
        landed = true;
        grounded = true;
        break;
      }
    }
    if (!landed && playerY > GROUND_Y) {
      playerY = GROUND_Y;
      velY = 0;
      grounded = true;
    }
    if (playerX >= W) playerX -= W;
    else if (playerX < 0) playerX += W;

    playerOval.pos.x = playerX;
    playerOval.pos.y = playerY - h / 2;

    if (lastShotLineFrames > 0) lastShotLineFrames--;

    for (let i = arrows.length - 1; i >= 0; i--) {
      const a = arrows[i];
      a.x += a.vx * dt();
      a.y += a.vy * dt();
      a.vy += GRAVITY * dt();
      if (a.x < -50 || a.x > W + 50 || a.y < -50 || a.y > H + 50) {
        arrows.splice(i, 1);
      } else if (
        a.x > target.pos.x - TARGET_R &&
        a.x < target.pos.x + TARGET_R &&
        a.y > target.pos.y - TARGET_R &&
        a.y < target.pos.y + TARGET_R
      ) {
        score++;
        scoreLabel.text = "Score: " + score;
        arrows.splice(i, 1);
        destroy(target);
        target = add([
          circle(TARGET_R),
          pos(Math.random() * (W - 100) + 50, Math.random() * (GROUND_Y - 120) + 40),
          color(220, 100, 100),
          anchor("center"),
          "target",
        ]);
      }
    }
  });

  onDraw(() => {
    if (dragStart && dragCurrent) {
      drawLine({
        p1: vec2(dragStart.x, dragStart.y),
        p2: vec2(dragCurrent.x, dragCurrent.y),
        width: 2,
        color: rgb(100, 200, 255),
        opacity: 0.15,
      });
    } else if (lastShotLine && lastShotLineFrames > 0) {
      drawLine({
        p1: vec2(lastShotLine.start.x, lastShotLine.start.y),
        p2: vec2(lastShotLine.end.x, lastShotLine.end.y),
        width: 2,
        color: rgb(100, 200, 255),
        opacity: 0.15,
      });
    }

    for (const p of PLATFORMS) {
      drawRect({
        pos: vec2(p.x, p.y),
        width: p.w,
        height: p.h,
        color: rgb(70, 95, 55),
      });
      drawRect({
        pos: vec2(p.x, p.y),
        width: p.w,
        height: 4,
        color: rgb(85, 115, 65),
      });
    }
    drawRect({
      pos: vec2(0, GROUND_Y),
      width: W,
      height: GROUND_H,
      color: rgb(60, 80, 50),
    });
    drawRect({
      pos: vec2(0, GROUND_Y),
      width: W,
      height: 4,
      color: rgb(80, 100, 70),
    });

    for (const a of arrows) {
      const ax = Math.atan2(a.vy, a.vx);
      pushTransform();
      pushTranslate(a.x, a.y);
      pushRotate(ax * 180 / Math.PI);
      drawRect({ pos: vec2(-14, -2), width: 28, height: 4, color: rgb(160, 120, 70) });
      drawTriangle({
        p1: vec2(24, 0),
        p2: vec2(14, -6),
        p3: vec2(14, 6),
        color: rgb(140, 140, 150),
      });
      drawRect({ pos: vec2(-20, -6), width: 6, height: 6, color: rgb(180, 60, 60) });
      drawRect({ pos: vec2(-20, 0), width: 6, height: 6, color: rgb(180, 60, 60) });
      popTransform();
    }
  });

  add([
    text("WASD move, W/Up jump, S/Down crouch. Click-drag-release to shoot (power = drag length)", { size: 12 }),
    pos(W / 2, H - 8),
    anchor("center"),
    color(180, 180, 190),
    opacity(0.7),
  ]);
});

go("game");
</script>
</body>
</html>
